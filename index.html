<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Vividink — Creators of the Immortal Mark.</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<!-- Original CSS Stylesheets -->
<link rel="stylesheet" href="site.css?v=3"/>
<link rel="stylesheet" href="case.css?v=1"/>
<link rel="icon" href="assets/v-mark.png"/>

<!-- Core Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
</head>
<body>
<div id="root" data-screen-label="Vividink Site"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// 1. Unified Translations & Portfolio Data
const I18N = {
  ar: {
    'nav.home': 'الرئيسية',
    'nav.about': 'عن الوكالة',
    'nav.services': 'خدماتنا',
    'nav.work': 'أعمالنا',
    'nav.contact': 'تواصل معنا',
    'hero.title': 'صُنّاع الأَثَر الخالد .',
    'hero.sub': 'فريق إبداعي متكامل لصياغة هويات بصرية لا تُنسى . جذور كلاسيكية ، حدّة معاصرة — عقودٌ بصرية بين علامتك وجمهورها .',
    'hero.ctaWork': 'شاهد الأعمال',
    'hero.ctaTalk': 'ابدأ مشروعاً ←',
    'hero.immortalMark': 'صناع الأثر الخالد'
  },
  en: {
    'nav.home': 'Home',
    'nav.about': 'About',
    'nav.services': 'Services',
    'nav.work': 'Work',
    'nav.contact': 'Contact',
    'hero.title': 'Creators of the Immortal Mark.',
    'hero.sub': 'A full-service creative agency crafting unforgettable visual identities.',
    'hero.ctaWork': 'View Work',
    'hero.ctaTalk': 'Start a Project ←',
    'hero.immortalMark': 'Creators of the Immortal Mark'
  }
};

const PORTFOLIO_ITEMS = [
  { id: 'anzu', title: 'أنزو — Anzu', cat: 'هوية بصرية', img: 'assets/anzu/01-cave.png' },
  { id: 'nasma', title: 'نسمة — Nasma', cat: 'حملات بصرية', img: 'assets/nasma/cover.png' },
  { id: 'exhibition', title: 'المعرض المعماري', cat: 'تصميم مساحي', img: 'portfolio-exhibition.png' },
  { id: 'chess', title: 'استراتيجية الشطرنج', cat: 'هوية مفاهيمية', img: 'portfolio-chess.png' },
  { id: 'fabric', title: 'جوهر النسيج', cat: 'إنتاج إعلاني', img: 'portfolio-fabric-essence.png' }
];

function T(key, lang = 'ar') {
  return (I18N[lang] && I18N[lang][key]) || I18N['ar'][key] || key;
}

// 2. Navigation Header Component
function Nav({ onNav, lang, setLang }) {
  return (
    <header className="nav nav--scrolled">
      <div className="nav__inner">
        <a className="nav__brand" onClick={() => onNav('home')} style={{ cursor: 'pointer' }}>
          <img src="assets/v-mark.png" alt="Vividink" className="nav__logo" onError={(e) => e.target.style.display='none'} />
          <span className="nav__name">Vividink</span>
        </a>
        <div className="nav__actions" style={{ display: 'flex', gap: '20px', alignItems: 'center' }}>
          <a onClick={() => onNav('home')} style={{ cursor: 'pointer', color: '#fff' }}>{T('nav.home', lang)}</a>
          <a onClick={() => onNav('about')} style={{ cursor: 'pointer', color: '#fff' }}>{T('nav.about', lang)}</a>
          <a onClick={() => onNav('services')} style={{ cursor: 'pointer', color: '#fff' }}>{T('nav.services', lang)}</a>
          <a onClick={() => onNav('work')} style={{ cursor: 'pointer', color: '#fff' }}>{T('nav.work', lang)}</a>
          <a onClick={() => onNav('contact')} style={{ cursor: 'pointer', color: '#fff' }}>{T('nav.contact', lang)}</a>
          <button className="nav__lang" onClick={() => setLang(lang === 'ar' ? 'en' : 'ar')}>
            {lang === 'ar' ? 'EN' : 'عربي'}
          </button>
        </div>
      </div>
    </header>
  );
}

// 3. Hero Section with Hand Ink Video
function HomePage({ lang, onNav }) {
  return (
    <main className="page-home">
      <section className="hero">
        <div className="hero__video-wrap" style={{ opacity: 0.78 }}>
          <video className="hero__video" src="hand-ink.mp4" autoPlay muted loop playsInline></video>
        </div>
        <div className="hero__content">
          <h1 className="hero__display">{T('hero.title', lang)}</h1>
          <p className="hero__sub">{T('hero.sub', lang)}</p>
          <div className="hero__btns" style={{ display: 'flex', gap: '15px', justifyContent: 'center' }}>
            <button className="btn btn--primary" onClick={() => onNav('work')}>{T('hero.ctaWork', lang)}</button>
            <button className="btn btn--ghost" onClick={() => onNav('contact')}>{T('hero.ctaTalk', lang)}</button>
          </div>
        </div>
      </section>
    </main>
  );
}

// 4. Portfolio Works Page
function WorkPage({ lang }) {
  return (
    <main className="page-work" style={{ padding: '120px 20px 80px', maxWidth: '1200px', margin: '0 auto' }}>
      <h1 className="sec-head__title" style={{ fontSize: '3rem', fontWeight: 'bold', marginBottom: '40px', textAlign: 'center' }}>
        أعمالٌ صُنعت لتخلد
      </h1>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '30px' }}>
        {PORTFOLIO_ITEMS.map((item) => (
          <div key={item.id} style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '16px', overflow: 'hidden' }}>
            <div style={{ height: '240px', overflow: 'hidden' }}>
              <img src={item.img} alt={item.title} style={{ width: '100%', height: '100%', objectFit: 'cover' }} onError={(e) => { e.target.src='portfolio-cover.png'; }} />
            </div>
            <div style={{ padding: '20px' }}>
              <span style={{ color: '#ff0000', fontSize: '0.85rem', textTransform: 'uppercase' }}>{item.cat}</span>
              <h3 style={{ fontSize: '1.3rem', fontWeight: 'bold', marginTop: '5px' }}>{item.title}</h3>
            </div>
          </div>
        ))}
      </div>
    </main>
  );
}

// 5. Contact Page with Direct Survey Link & Contact Info
function ContactPage({ lang }) {
  return (
    <main className="page-contact" style={{ padding: '140px 20px 80px', textAlign: 'center', maxWidth: '800px', margin: '0 auto' }}>
      <h1 className="sec-head__title" style={{ fontSize: '3rem', fontWeight: 'bold', marginBottom: '20px' }}>
        دعنا نصنع أثراً يخلد.
      </h1>
      <p style={{ opacity: 0.8, fontSize: '1.2rem', marginBottom: '40px' }}>
        نحن جاهزون لبدء مشروعك القادم وصناعة أثر لا يُنسى لعلامتك التجارية.
      </p>

      <div style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.1)', padding: '40px', borderRadius: '24px', marginBottom: '40px' }}>
        <div style={{ marginBottom: '25px' }}>
          <div style={{ opacity: 0.5, fontSize: '0.9rem', marginBottom: '5px' }}>البريد الإلكتروني</div>
          <a href="mailto:info@vividinkmedia.com" style={{ fontSize: '1.4rem', color: '#fff', textDecoration: 'none', fontWeight: 'bold' }}>
            info@vividinkmedia.com
          </a>
        </div>

        <div style={{ marginBottom: '35px' }}>
          <div style={{ opacity: 0.5, fontSize: '0.9rem', marginBottom: '5px' }}>التواصل عبر الواتساب</div>
          <a href="https://wa.me/963946976617" target="_blank" rel="noreferrer" style={{ fontSize: '1.4rem', color: '#25D366', textDecoration: 'none', fontWeight: 'bold' }}>
            0946976617
          </a>
        </div>

        <a href="http://survey.vividinkmedia.com" className="btn btn--primary" style={{ display: 'inline-block', padding: '18px 36px', fontSize: '1.2rem', textDecoration: 'none' }}>
          الانتقال إلى استبيان العميل (Client Brief) ←
        </a>
      </div>
    </main>
  );
}

// 6. Main App
function App() {
  const [scene, setScene] = useState('home');
  const [lang, setLang] = useState('ar');

  useEffect(() => {
    document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.documentElement.lang = lang;
    document.documentElement.style.setProperty('--vi-red', 'rgb(255, 0, 0)');
    document.documentElement.style.setProperty('--accent', 'rgb(255, 0, 0)');
  }, [lang]);

  return (
    <div>
      <Nav onNav={setScene} lang={lang} setLang={setLang} />
      {scene === 'home' && <HomePage lang={lang} onNav={setScene} />}
      {scene === 'work' && <WorkPage lang={lang} />}
      {scene === 'contact' && <ContactPage lang={lang} />}
      <footer style={{ padding: '40px', textAlign: 'center', opacity: 0.5, borderTop: '1px solid rgba(255,255,255,0.1)' }}>
        © 2026 Vividink. جميع الحقوق محفوظة.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
