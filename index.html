<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Vividink — Creators of the Immortal Mark.</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<!-- CSS Files -->
<link rel="stylesheet" href="site.css?v=3"/>
<link rel="stylesheet" href="case.css?v=1"/>
<link rel="icon" href="assets/v-mark.png"/>

<script>
  // Automatic Media Fallback Script for Portfolio & Assets (Anzu, Nasma, etc.)
  document.addEventListener('error', function (e) {
    if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') {
      let src = e.target.getAttribute('src');
      if (src) {
        if (!src.startsWith('assets/') && !src.startsWith('http')) {
          e.target.src = 'assets/' + src;
        } else if (src.startsWith('assets/anzu/')) {
          // If path issue with anzu subfolder
          e.target.src = src.replace('assets/anzu/', 'assets/');
        }
      }
    }
  }, true);
</script>
</head>
<body>
<div id="root" data-screen-label="Vividink Site"></div>

<!-- React, ReactDOM, Babel CDNs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js" crossorigin="anonymous"></script>

<!-- Script & JSX Files -->
<script src="i18n.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = {
  "lang": "ar",
  "redIntensity": 100,
  "heroVideoOpacity": 78,
  "headingScale": 100,
  "showLoader": true,
  "menuStyle": "overlay"
};

const detectLang = () => {
  if (typeof navigator === 'undefined') return 'en';
  const l = (navigator.language || 'en').toLowerCase();
  return l.startsWith('ar') ? 'ar' : 'en';
};

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [scene, setScene] = useState('home');
  const [menuOpen, setMenuOpen] = useState(false);
  const [navScrolled, setNavScrolled] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [firstVisit, setFirstVisit] = useState(true);

  const lang = tweaks.lang === 'auto' ? detectLang() : tweaks.lang;

  useEffect(() => {
    document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.documentElement.lang = lang;
  }, [lang]);

  // Apply red intensity tint via CSS var
  useEffect(() => {
    const k = tweaks.redIntensity / 100;
    const r = Math.round(255 * k);
    document.documentElement.style.setProperty('--vi-red', `rgb(${r}, 0, 0)`);
    document.documentElement.style.setProperty('--accent', `rgb(${r}, 0, 0)`);
  }, [tweaks.redIntensity]);

  useEffect(() => {
    document.documentElement.style.setProperty('--heading-scale', tweaks.headingScale / 100);
  }, [tweaks.headingScale]);

  useEffect(() => {
    if (!tweaks.showLoader) { setLoaded(true); setFirstVisit(false); return; }
    const t = setTimeout(() => { setLoaded(true); setFirstVisit(false); }, 1700);
    return () => clearTimeout(t);
  }, []);

  useEffect(() => {
    const onScroll = () => setNavScrolled(window.scrollY > 30);
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  useEffect(() => {
    window.scrollTo({ top: 0, behavior: 'auto' });
  }, [scene]);

  // Hide the "هوية · سوشل · سينما" tag on load
  useEffect(() => {
    const removeTag = () => {
      const tags = document.querySelectorAll('.hero__tag, .hero__kicker, .hero__eyebrow');
      tags.forEach(el => {
        if (el.textContent.includes('هوية') || el.textContent.includes('سوشل') || el.textContent.includes('سينما')) {
          el.style.display = 'none';
        }
      });
    };
    removeTag();
    const timer = setTimeout(removeTag, 500);
    return () => clearTimeout(timer);
  }, [scene]);

  const onNav = (key) => { 
    if (key === 'survey' || key === 'contact') {
      window.location.href = 'http://survey.vividinkmedia.com';
      return;
    }
    setScene(key); 
    setMenuOpen(false); 
  };

  window.__heroOpacity = tweaks.heroVideoOpacity / 100;

  return (
    <>
      {firstVisit && <Loader done={loaded} lang={lang} />}
      <ScrollRule />
      <Nav onMenu={() => setMenuOpen(true)} onNav={onNav} lang={lang} setLang={(l) => setTweak('lang', l)} scrolled={navScrolled} />
      <MenuOverlay open={menuOpen} onClose={() => setMenuOpen(false)} onNav={onNav} lang={lang} />

      {scene === 'home'     && <HomePage lang={lang} onNav={onNav} />}
      {scene === 'about'    && <AboutPage lang={lang} />}
      {scene === 'services' && <ServicesPage lang={lang} onNav={onNav} />}
      {scene === 'work'     && <WorkPage lang={lang} onNav={onNav} />}

      {/* Custom Contact Section Redirecting to Survey + New Contact Info */}
      {scene === 'contact'  && (
        <main class="page-contact" style={{ padding: '120px 20px 80px', textAlign: 'center', maxWidth: '800px', margin: '0 auto' }}>
          <h1 style={{ fontSize: '3rem', fontWeight: 'bold', marginBottom: '20px' }}>تواصل معنا</h1>
          <p style={{ opacity: 0.8, fontSize: '1.2rem', marginBottom: '40px' }}>
            نحن جاهزون لبدء مشروعك القادم وصناعة أثر لا يُنسى لعلامتك التجارية.
          </p>

          <div style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.1)', padding: '40px', borderRadius: '24px', marginBottom: '40px' }}>
            <div style={{ marginBottom: '25px' }}>
              <div style={{ opacity: 0.5, fontSize: '0.9rem', marginBottom: '5px' }}>البريد الإلكتروني</div>
              <a href="mailto:info@vividinkmedia.com" style={{ fontSize: '1.4rem', color: '#fff', textDecoration: 'none', fontWeight: 'bold' }}>
                info@vividinkmedia.com
              </a>
            </div>

            <div style={{ marginBottom: '35px' }}>
              <div style={{ opacity: 0.5, fontSize: '0.9rem', marginBottom: '5px' }}>التواصل عبر الواتساب</div>
              <a href="https://wa.me/963946976617" target="_blank" style={{ fontSize: '1.4rem', color: '#25D366', textDecoration: 'none', fontWeight: 'bold' }}>
                0946976617
              </a>
            </div>

            <a href="http://survey.vividinkmedia.com" class="btn btn--primary" style={{ display: 'inline-block', padding: '18px 36px', fontSize: '1.2rem', textDecoration: 'none' }}>
              تعبئة استبيان العميل (Client Brief) ←
            </a>
          </div>
        </main>
      )}

      <Footer lang={lang} onNav={onNav} />

      <TweaksPanel title={lang === 'ar' ? 'لوحة التعديلات' : 'Tweaks'}>
        <TweakSection title={lang === 'ar' ? 'اللغة' : 'Language'}>
          <TweakRadio
            label={lang === 'ar' ? 'لغة الواجهة' : 'Interface'}
            value={tweaks.lang}
            onChange={v => setTweak('lang', v)}
            options={[
              { value: 'auto', label: lang === 'ar' ? 'تلقائي' : 'Auto' },
              { value: 'en',   label: 'EN' },
              { value: 'ar',   label: 'ع' },
            ]}
          />
        </TweakSection>

        <TweakSection title={lang === 'ar' ? 'الفيديو' : 'Hero Video'}>
          <TweakSlider
            label={lang === 'ar' ? 'شفافية الفيديو' : 'Opacity'}
            value={tweaks.heroVideoOpacity}
            onChange={v => setTweak('heroVideoOpacity', v)}
            min={20} max={100} step={2}
            unit="%"
          />
        </TweakSection>

        <TweakSection title={lang === 'ar' ? 'الهوية' : 'Brand'}>
          <TweakSlider
            label={lang === 'ar' ? 'شدّة الأحمر' : 'Red intensity'}
            value={tweaks.redIntensity}
            onChange={v => setTweak('redIntensity', v)}
            min={50} max={100} step={2}
            unit="%"
          />
          <TweakSlider
            label={lang === 'ar' ? 'حجم العناوين' : 'Heading scale'}
            value={tweaks.headingScale}
            onChange={v => setTweak('headingScale', v)}
            min={75} max={120} step={5}
            unit="%"
          />
        </TweakSection>

        <TweakSection title={lang === 'ar' ? 'سلوك' : 'Behavior'}>
          <TweakToggle
            label={lang === 'ar' ? 'شاشة التحميل عند البدء' : 'Show loader on start'}
            value={tweaks.showLoader}
            onChange={v => setTweak('showLoader', v)}
          />
        </TweakSection>

        <TweakSection title={lang === 'ar' ? 'الانتقال السريع' : 'Quick nav'}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            <TweakButton onClick={() => onNav('home')}>{T('nav.home', lang)}</TweakButton>
            <TweakButton onClick={() => onNav('about')}>{T('nav.about', lang)}</TweakButton>
            <TweakButton onClick={() => onNav('services')}>{T('nav.services', lang)}</TweakButton>
            <TweakButton onClick={() => onNav('work')}>{T('nav.work', lang)}</TweakButton>
            <TweakButton onClick={() => onNav('contact')}>{T('nav.contact', lang)}</TweakButton>
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<style>
  .hero__display, .page-hero__title, .sec-head__title, .svc__ttl, .svc-detail__title, .about-split__txt h3, .manifesto__big {
    font-size: calc(var(--__base-fs, 1em) * var(--heading-scale, 1));
  }
</style>
</body>
</html>
