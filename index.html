<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <title>Vividink — Creators of the Immortal Mark.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="icon" href="assets/v-mark.png"/>

  <!-- React & ReactDOM & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts & Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { font-family: 'Tajawal', sans-serif; }
    body { background-color: #050505; color: #ffffff; margin: 0; overflow-x: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Original VividInk Header ---
    function Header() {
      return (
        <header className="fixed top-0 left-0 right-0 z-50 backdrop-blur-lg bg-black/40 border-b border-white/10">
          <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <img src="assets/v-mark.png" alt="VividInk" className="h-10 w-auto" onError={(e) => e.target.style.display='none'} />
              <span className="font-extrabold text-2xl tracking-wider">Vivid<span className="text-purple-500">Ink</span></span>
            </div>
            <nav className="hidden md:flex items-center gap-8 text-sm font-medium text-gray-300">
              <a href="#about" className="hover:text-white transition-colors">عن الوكالة</a>
              <a href="#services" className="hover:text-white transition-colors">خدماتنا</a>
              <a href="#bezmanato" className="hover:text-white transition-colors">بزماناتو</a>
              <a href="#work" className="hover:text-white transition-colors">أعمالنا</a>
            </nav>
            <a href="http://survey.vividinkmedia.com" className="bg-white text-black font-bold px-6 py-2.5 rounded-full hover:bg-gray-200 transition-all text-sm">
              ابدأ مشروعك
            </a>
          </div>
        </header>
      );
    }

    // --- Hero Section ---
    function Hero() {
      return (
        <section className="relative pt-36 pb-20 px-6 max-w-7xl mx-auto text-center">
          <div className="inline-block px-4 py-1.5 rounded-full border border-purple-500/30 bg-purple-500/10 text-purple-300 text-xs font-semibold mb-6">
            Creators of the Immortal Mark
          </div>
          <h1 className="text-5xl md:text-7xl font-black mb-8 leading-tight max-w-4xl mx-auto">
            نحول الرؤى الجريئة إلى <span className="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-500 to-blue-500">علامات تجارية خالدة</span>
          </h1>
          <p className="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto mb-10 leading-relaxed">
            وكالة إبداعية متخصصة في صناعة الهويات البصرية، الإنتاج المرئي السينمائي، وحملات التسويق الموجهة.
          </p>
          <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
            <a href="http://survey.vividinkmedia.com" className="w-full sm:w-auto bg-purple-600 hover:bg-purple-700 text-white font-bold px-8 py-4 rounded-xl transition-all shadow-lg shadow-purple-600/30">
              تعبئة استبيان العميل (Brief)
            </a>
            <a href="#work" className="w-full sm:w-auto border border-white/20 hover:border-white/40 text-white font-medium px-8 py-4 rounded-xl transition-all bg-white/5">
              استكشف معرض الأعمال
            </a>
          </div>
        </section>
      );
    }

    // --- Services Section ---
    function Services() {
      const servicesList = [
        { title: "صناعة الهويات البصرية", desc: "تصميم بناء معنوي وبصري متكامل للعلامات التجارية بأسلوب هندسي فريد." },
        { title: "الإنتاج المرئي والـ AI Video", desc: "إنتاج إعلانات وسرد سينمائي باستخدام أحدث أدوات الذكاء الاصطناعي التوليدي." },
        { title: "إدارة الحملات والإستراتيجية", desc: "تخطيط وتنفيذ حملات تسويقية عابرة للحدود تستهدف السوق الخليجي والإقليمي." }
      ];

      return (
        <section id="services" className="py-20 px-6 max-w-7xl mx-auto">
          <h2 className="text-3xl md:text-4xl font-bold text-center mb-16">خدماتنا الإستراتيجية</h2>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
            {servicesList.map((s, i) => (
              <div key={i} className="p-8 rounded-2xl bg-zinc-900/50 border border-white/10 hover:border-purple-500/50 transition-all">
                <div className="text-purple-400 font-extrabold text-xl mb-4">0{i+1}</div>
                <h3 className="text-xl font-bold mb-3">{s.title}</h3>
                <p className="text-gray-400 text-sm leading-relaxed">{s.desc}</p>
              </div>
            ))}
          </div>
        </section>
      );
    }

    // --- Bezmanato Series Section ---
    function Bezmanato() {
      return (
        <section id="bezmanato" className="py-20 px-6 max-w-7xl mx-auto my-12 bg-gradient-to-r from-purple-950/40 to-blue-950/40 rounded-3xl border border-white/10 p-8 md:p-12">
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
            <div>
              <span className="text-purple-400 font-bold text-xs uppercase tracking-widest block mb-2">سلسلة VividInk الأصلية</span>
              <h2 className="text-3xl md:text-5xl font-black mb-6">سلسلة بزماناتو (Bezmanato)</h2>
              <p className="text-gray-300 text-base md:text-lg leading-relaxed mb-6">
                برنامج قصصي سينمائي يغوص في تاريخ الأعمال والأحداث العالمية الغريبة، مبني على سكريبتات محبوكة وهوكات بصرية جاذبة.
              </p>
            </div>
            <div className="rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
              <img src="assets/anzu/01-cave.png" alt="Bezmanato" className="w-full h-auto object-cover" onError={(e) => e.target.style.display='none'} />
            </div>
          </div>
        </section>
      );
    }

    // --- Main App ---
    function App() {
      return (
        <div>
          <Header />
          <Hero />
          <Services />
          <Bezmanato />
          <footer className="border-t border-white/10 py-8 text-center text-gray-500 text-sm">
            © 2026 VividInk. جميع الحقوق محفوظة.
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
