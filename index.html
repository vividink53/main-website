      desc: { ar: 'صياغة العهد البصري الأول : من الشعار والمفهوم إلى الأدلة التنفيذية .', en: 'Drafting the foundational covenant: from mark & concept to brand guidelines.' },
      tags: ['Brand Mark', 'Identity System', 'Guidelines']
    },
    {
      id: 'video', num: '02',
      title: { ar: 'الإنتاج المرئي والسينمائي', en: 'Video & Film Production' },
      desc: { ar: 'سرد سينمائي رفيع المستوى لبراندات الفخامة والمنتجات ، مدعوم بتقنيات الذكاء الاصطناعي .', en: 'High-end cinematic storytelling backed by generative AI.' },
      tags: ['Cinematic Ads', 'AI Video', 'VFX']
    },
    {
      id: 'social', num: '03',
      title: { ar: 'إدارة السوشل ميديا والاستراتيجية', en: 'Social Media & Content Strategy' },
      desc: { ar: 'تخطيط وتنفيذ حملات تسويقية عابرة للحدود تستهدف الأسواق الإقليمية .', en: 'Strategic content matrices and cross-border campaigns.' },

    title: { ar: 'علامات صُنعت لتخلد .', en: 'Marks Crafted to Endure.' },

    author: { ar: 'كميت زروند', en: 'Komaet Zarawnd' },
    role: { ar: 'المشرف العام والشريك المؤسس — Vividink', en: 'General Supervisor & Co-founder — Vividink' }

  cta_strip: {
    title: { ar: 'جاهز لبناء علامة لا تُمحى ؟', en: 'Ready to build a mark that never fades?' },
    sub: { ar: 'استبيان العميل هو الخطوة الأولى لتحديد أهدافك بدقة وبناء استراتيجية لا حيدة عنها .', en: 'The Client Brief is our first step.' },
    btn: { ar: 'تعبئة استبيان العميل (Brief) ←', en: 'Fill Out Client Brief ←' }
  }
};

function T(key, lang = 'ar') {
  const parts = key.split('.');
  let curr = window.I18N;
  for (const p of parts) {
    if (curr && curr[p] !== undefined) curr = curr[p];
    else return key;
  }
  if (typeof curr === 'object' && curr !== null) return curr[lang] || curr['ar'] || key;
  return curr || key;
}

// ==================== 2. COMPONENTS ====================
function Loader({ done, lang }) {
  return (
    <div className={`loader ${done ? 'loader--done' : ''}`}>
      <div className="loader__inner">
        <div className="loader__mark">
          <img src="assets/v-mark.png" alt="Vividink" />
        </div>
        <div className="loader__txt">{T('hero.immortalMark', lang)}</div>
      </div>
    </div>
  );
}

function ScrollRule() { return <div className="scroll-rule"></div>; }

function Nav({ onMenu, onNav, lang, setLang, scrolled }) {
  return (
    <header className={`nav ${scrolled ? 'nav--scrolled' : ''}`}>
      <div className="nav__inner">
        <a className="nav__brand" onClick={() => onNav('home')} style={{ cursor: 'pointer' }}>
          <img src="assets/v-mark.png" alt="Vividink" className="nav__logo" onError={(e) => e.target.style.display='none'} />
          <span className="nav__name">Vividink</span>
        </a>
        <div className="nav__actions">
          <button className="nav__lang" onClick={() => setLang(lang === 'ar' ? 'en' : 'ar')}>
            {lang === 'ar' ? 'EN' : 'عربي'}
          </button>
          <button className="nav__burger" onClick={onMenu} aria-label="Menu">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </header>
  );
}

function MenuOverlay({ open, onClose, onNav, lang }) {
  if (!open) return null;
  return (
    <div className="menu-overlay">
      <button className="menu-overlay__close" onClick={onClose}>✕</button>
      <nav className="menu-overlay__nav">
        <a onClick={() => onNav('home')}>{T('nav.home', lang)}</a>
        <a onClick={() => onNav('about')}>{T('nav.about', lang)}</a>
        <a onClick={() => onNav('services')}>{T('nav.services', lang)}</a>
        <a onClick={() => onNav('work')}>{T('nav.work', lang)}</a>
        <a onClick={() => onNav('contact')}>{T('nav.contact', lang)}</a>
      </nav>
    </div>
  );
}

function Hero({ lang, onNav, videoOpacity }) {
  return (
    <section className="hero">
      <div className="hero__video-wrap" style={{ opacity: videoOpacity }}>
        <video className="hero__video" src="hand-ink.mp4" autoPlay muted loop playsInline></video>
      </div>
      <div className="hero__content">
        <h1 className="hero__display">{T('hero.title', lang)}</h1>
        <p className="hero__sub">{T('hero.sub', lang)}</p>
        <div className="hero__btns">
          <button className="btn btn--primary" onClick={() => onNav('work')}>{T('hero.ctaWork', lang)}</button>
          <a href="http://survey.vividinkmedia.com" className="btn btn--ghost">{T('hero.ctaTalk', lang)}</a>
        </div>
      </div>
    </section>
  );
}

function Metrics({ lang }) {
  const list = window.I18N.metrics || [];
  return (
    <section className="section metrics-sec">
      <div className="metrics-grid">
        {list.map((m, i) => (
          <div key={i} className="metric-card">
            <span className="metric-card__num">{m.num}</span>
            <span className="metric-card__lbl">{m.label[lang]}</span>
          </div>
        ))}
      </div>
    </section>
  );
}

function Manifesto({ lang }) {
  return (
    <section className="section manifesto">
      <h2 className="manifesto__big">{T('manifesto.big', lang)}</h2>
      <p className="manifesto__sub">{T('manifesto.sub', lang)}</p>
    </section>
  );
}

function SecHead({ eyebrow, title, num }) {
  return (
    <div className="sec-head">
      <div className="sec-head__meta">
        <span className="sec-head__eyebrow">{eyebrow}</span>
        <span className="sec-head__num">{num}</span>
      </div>
      <h2 className="sec-head__title">{title}</h2>
    </div>
  );
}

function ServiceRows({ lang, onNav }) {
  const list = window.I18N.services || [];
  return (
    <div className="services-rows">
      {list.map(s => (
        <div key={s.id} className="svc-row" onClick={() => onNav('services')} style={{ cursor: 'pointer' }}>
          <span className="svc-row__num">{s.num}</span>
          <div className="svc-row__main">
            <h3 className="svc__ttl">{s.title[lang]}</h3>
            <p className="svc__desc">{s.desc[lang]}</p>
          </div>
          <div className="svc-row__tags">
            {s.tags.map((t, idx) => <span key={idx} className="tag">{t}</span>)}
          </div>
        </div>
      ))}
    </div>
  );
}

function WorkGrid({ lang, limit = 99 }) {
  const list = (window.I18N.portfolio || []).slice(0, limit);
  return (
    <div className="work-grid">
      {list.map(w => (
        <div key={w.id} className="work-card">
          <div className="work-card__img-wrap">
            <img src={w.img} alt={w.title[lang]} onError={(e) => { e.target.src = 'portfolio-cover.png'; }} />
          </div>
          <div className="work-card__info">
            <span className="work-card__cat">{w.cat[lang]}</span>
            <h3 className="work-card__title">{w.title[lang]}</h3>
            <span className="work-card__year">{w.year}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

function FounderQuote({ lang }) {
  const q = window.I18N.founder_quote;
  return (
    <section className="section founder-sec">
      <blockquote className="founder-quote">
        <p>{q.quote[lang]}</p>
        <cite>
          <strong>{q.author[lang]}</strong>
          <span>{q.role[lang]}</span>
        </cite>
      </blockquote>
    </section>
  );
}

function CtaStrip({ lang }) {
  return (
    <section className="section cta-strip">
      <div className="cta-strip__inner">
        <h2>{T('cta_strip.title', lang)}</h2>
        <p>{T('cta_strip.sub', lang)}</p>
        <a href="http://survey.vividinkmedia.com" className="btn btn--primary btn--lg">
          {T('cta_strip.btn', lang)}
        </a>
      </div>
    </section>
  );
}

function Footer({ lang, onNav }) {
  return (
    <footer className="footer">
      <div className="footer__inner">
        <div className="footer__brand">
          <img src="assets/v-mark.png" alt="Vividink" className="footer__logo" onError={(e) => e.target.style.display='none'} />
          <span>Vividink — Creators of the Immortal Mark.</span>
        </div>
        <div className="footer__copy">
          © 2026 Vividink. All rights reserved.
        </div>
      </div>
    </footer>

// ==================== 3. PAGES ====================
function HomePage({ lang, onNav }) {
  return (
    <div className="scene">
      <Hero lang={lang} onNav={onNav} videoOpacity={window.__heroOpacity || 0.78} />
      <Metrics lang={lang} />
      <Manifesto lang={lang} />
      <section className="section" data-screen-label="Services">
        <SecHead eyebrow={T('services_section.eyebrow', lang)} title={T('services_section.title', lang)} num="01" />
        <ServiceRows lang={lang} onNav={onNav} />
      </section>
      <section className="section" data-screen-label="Work">
        <SecHead eyebrow={T('work_section.eyebrow', lang)} title={T('work_section.title', lang)} num="02" />
        <WorkGrid lang={lang} limit={4} />
      </section>
      <FounderQuote lang={lang} />
      <CtaStrip lang={lang} />
    </div>
  );
}

    <div className="scene page-about" style={{ padding: '140px 20px 80px', maxWidth: '1000px', margin: '0 auto' }}>

      <p style={{ opacity: 0.8, fontSize: '1.2rem', lineHeight: '1.8' }}>
        تأسست Vividink لتكون بديلاً عقلانياً وهندسياً للسطحية الإعلانية السائدة. نجمع بين الهندسة الميكاترونيكية الدقيقة، الجماليات البصرية الكلاسيكية، والسرد القصصي السينمائي لصياغة هويات بصرية تعزز حضور العلامات التجارية.
      </p>
    </div>

function ServicesPage({ lang, onNav }) {
  return (
    <div className="scene page-services" style={{ padding: '140px 20px 80px', maxWidth: '1000px', margin: '0 auto' }}>
      <h1 className="sec-head__title" style={{ fontSize: '3rem', fontWeight: 'bold', marginBottom: '30px' }}>خدماتنا</h1>
      <ServiceRows lang={lang} onNav={onNav} />
    </div>
  );
}

function WorkPage({ lang }) {
  return (
    <div className="scene page-work" style={{ padding: '140px 20px 80px', maxWidth: '1200px', margin: '0 auto' }}>
      <h1 className="sec-head__title" style={{ fontSize: '3rem', fontWeight: 'bold', marginBottom: '40px', textAlign: 'center' }}>
        علاماتٌ صُنعت لتخلد .
      </h1>
      <WorkGrid lang={lang} limit={99} />
    </div>
  );
}

function ContactPage({ lang }) {
  return (
    <main className="page-contact" style={{ padding: '140px 20px 80px', textAlign: 'center', maxWidth: '800px', margin: '0 auto' }}>
      <h1 className="sec-head__title" style={{ fontSize: '3rem', fontWeight: 'bold', marginBottom: '20px' }}>
        دعنا نصنع أثراً يخلد.
      </h1>
      <p style={{ opacity: 0.8, fontSize: '1.2rem', marginBottom: '40px' }}>
        نحن جاهزون لبدء مشروعك القادم وصناعة أثر لا يُنسى لعلامتك التجارية.
      </p>

      <div style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.1)', padding: '40px', borderRadius: '24px', marginBottom: '40px' }}>
        <div style={{ marginBottom: '25px' }}>
          <div style={{ opacity: 0.5, fontSize: '0.9rem', marginBottom: '5px' }}>البريد الإلكتروني</div>
          <a href="mailto:info@vividinkmedia.com" style={{ fontSize: '1.4rem', color: '#fff', textDecoration: 'none', fontWeight: 'bold' }}>
            info@vividinkmedia.com
          </a>
        </div>

        <div style={{ marginBottom: '35px' }}>
          <div style={{ opacity: 0.5, fontSize: '0.9rem', marginBottom: '5px' }}>التواصل عبر الواتساب</div>
          <a href="https://wa.me/963946976617" target="_blank" rel="noreferrer" style={{ fontSize: '1.4rem', color: '#25D366', textDecoration: 'none', fontWeight: 'bold' }}>
            0946976617
          </a>
        </div>

        <a href="http://survey.vividinkmedia.com" className="btn btn--primary" style={{ display: 'inline-block', padding: '18px 36px', fontSize: '1.2rem', textDecoration: 'none' }}>

        </a>
      </div>

// ==================== 4. MAIN APP ====================
function App() {
  const [scene, setScene] = useState('home');
  const [menuOpen, setMenuOpen] = useState(false);
  const [navScrolled, setNavScrolled] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [firstVisit, setFirstVisit] = useState(true);
  const [lang, setLang] = useState('ar');

  useEffect(() => {
    document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.documentElement.lang = lang;
    document.documentElement.style.setProperty('--vi-red', 'rgb(255, 0, 0)');
    document.documentElement.style.setProperty('--accent', 'rgb(255, 0, 0)');
    document.documentElement.style.setProperty('--heading-scale', '1');
  }, [lang]);

  useEffect(() => {
    const t = setTimeout(() => { setLoaded(true); setFirstVisit(false); }, 1700);
    return () => clearTimeout(t);
  }, []);

  useEffect(() => {
    const onScroll = () => setNavScrolled(window.scrollY > 30);
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  useEffect(() => {
    window.scrollTo({ top: 0, behavior: 'auto' });
  }, [scene]);

  const onNav = (key) => { setScene(key); setMenuOpen(false); };
  window.__heroOpacity = 0.78;

  return (
    <>
      {firstVisit && <Loader done={loaded} lang={lang} />}
      <ScrollRule />
      <Nav onMenu={() => setMenuOpen(true)} onNav={onNav} lang={lang} setLang={setLang} scrolled={navScrolled} />
      <MenuOverlay open={menuOpen} onClose={() => setMenuOpen(false)} onNav={onNav} lang={lang} />

      {scene === 'home'     && <HomePage lang={lang} onNav={onNav} />}
      {scene === 'about'    && <AboutPage lang={lang} />}
      {scene === 'services' && <ServicesPage lang={lang} onNav={onNav} />}
      {scene === 'work'     && <WorkPage lang={lang} />}
      {scene === 'contact'  && <ContactPage lang={lang} />}

      <Footer lang={lang} onNav={onNav} />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
